global
  log stdout format raw local0 info
  maxconn 4096

defaults
  mode http
  log global
  option httplog
  option dontlognull
  option forwardfor
  option http-server-close
  timeout connect 5s
  timeout client 30s
  timeout server 30s
  retries 3

#
# FRONTEND: single entry point for all HTTP traffic on port 8080
# Routes /api/* to the API backend, everything else to the web backend
#
frontend http_front
  bind *:8080
  acl is_api path_beg /api
  use_backend api_servers if is_api
  default_backend web_servers

#
# BACKEND: web servers (round-robin across 3 nginx nodes)
#
backend web_servers
  balance roundrobin
  option httpchk GET /
  server web1 web1:80 check inter 3s
  server web2 web2:80 check inter 3s
  server web3 web3:80 check inter 3s

#
# BACKEND: api servers (least-connections across 2 nginx nodes)
#
backend api_servers
  balance leastconn
  option httpchk GET /
  server api1 api1:80 check inter 3s
  server api2 api2:80 check inter 3s

#
# STATS: HAProxy stats page (what nri-haproxy scrapes)
#
listen stats
  bind *:8404
  stats enable
  stats uri /stats
  stats refresh 5s
  stats show-legends
  stats show-node
