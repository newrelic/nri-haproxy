name: Push/PR

on:
  push:
    branches:
      - main
      - master
      - renovate/**
  pull_request:
  workflow_dispatch:

jobs:
  push-pr:
    uses: newrelic/coreint-automation/.github/workflows/reusable_push_pr.yaml@v3
    secrets: inherit
      run_test_build_fake_prerelease: true
      goarch_matrix: '["amd64"]'
      integration: "haproxy"
